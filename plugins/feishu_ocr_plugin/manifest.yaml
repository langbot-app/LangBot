apiVersion: v1
kind: Plugin
metadata:
  author: local
  name: feishu_ocr_plugin
  repository: 'https://open.feishu.cn/'
  version: 0.1.0
  description:
    en_US: 'Use Feishu OCR API to recognize text from images.'
    zh_Hans: '使用飞书 OCR 接口识别图片文字。'
  label:
    en_US: Feishu OCR Plugin
    zh_Hans: 飞书 OCR 插件
  icon: assets/icon.svg
spec:
  config:
    - name: app_id
      label:
        en_US: App ID
        zh_Hans: 应用 ID
      type: string
      required: true
      default: ''
    - name: app_secret
      label:
        en_US: App Secret
        zh_Hans: 应用密钥
      type: string
      required: true
      default: ''
    - name: token_endpoint
      label:
        en_US: Token Endpoint
        zh_Hans: Token 接口地址
      description:
        en_US: 'Default uses tenant_access_token/internal for self-built app.'
        zh_Hans: '默认使用自建应用 tenant_access_token/internal 接口。'
      type: string
      required: false
      default: 'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal'
    - name: ocr_endpoint
      label:
        en_US: OCR Endpoint
        zh_Hans: OCR 接口地址
      type: string
      required: false
      default: 'https://open.feishu.cn/open-apis/optical_char_recognition/v1/image/basic_recognize'
    - name: timeout_seconds
      label:
        en_US: Timeout Seconds
        zh_Hans: 请求超时秒数
      type: string
      required: false
      default: '20'
  components:
    Tool:
      fromDirs:
        - path: components/tools/
    EventListener:
      fromDirs:
        - path: components/event_listeners/
execution:
  python:
    path: main.py
    attr: FeishuOcrPlugin
