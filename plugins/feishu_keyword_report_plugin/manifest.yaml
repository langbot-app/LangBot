apiVersion: v1
kind: Plugin
metadata:
  author: local
  name: feishu_keyword_report_plugin
  repository: "https://open.feishu.cn/"
  version: 0.1.19
  description:
    en_US: Reply keyword commands for daily report and touch-material query with Feishu Sheets + Bitable.
    zh_Hans: 通过口令查询日报与摸料信息，联动飞书在线表格和多维表。
  label:
    en_US: Feishu Keyword Report Plugin
    zh_Hans: 飞书口令查询插件
  icon: assets/icon.svg
spec:
  config:
    - name: app_id
      label:
        en_US: App ID
        zh_Hans: App ID
      type: string
      required: true
      default: ""
    - name: app_secret
      label:
        en_US: App Secret
        zh_Hans: App Secret
      type: string
      required: true
      default: ""
    - name: token_endpoint
      label:
        en_US: Token Endpoint
        zh_Hans: Token Endpoint
      type: string
      required: false
      default: "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal"
    - name: timeout_seconds
      label:
        en_US: Timeout Seconds
        zh_Hans: 超时秒数
      type: string
      required: false
      default: "20"

    - name: data_source_mode
      label:
        en_US: Data Source Mode
        zh_Hans: 数据源模式
      description:
        en_US: auto/sheets/bitable. auto means sheets first and bitable fallback.
        zh_Hans: auto/sheets/bitable。auto 表示在线表格优先，失败回退多维表。
      type: string
      required: false
      default: "auto"

    - name: sheets_spreadsheet_token
      label:
        en_US: Sheets Spreadsheet Token
        zh_Hans: 在线表格 Token
      description:
        en_US: Sheets token/URL. Legacy Wiki token/URL is also accepted and resolved automatically.
        zh_Hans: 支持在线表格 token/URL；旧配置保留的 Wiki token/URL 会自动解析为真实在线表格 token。
      type: string
      required: false
      default: ""
    - name: sheets_sheet_names
      label:
        en_US: Sheets Names
        zh_Hans: 在线表格工作表
      description:
        en_US: Optional extra sheet titles. Empty still auto-discovers matching S18-*/S006-*/S20-* line sheets.
        zh_Hans: 可选补充工作表标题；为空时仍会自动发现符合 S18-*线 / S006-*线 / S20-*线 规则的工作表。
      type: string
      required: false
      default: ""
    - name: sheet_auto_discovery_patterns_json
      label:
        en_US: Sheet Auto Discovery Patterns
        zh_Hans: 工作表自动发现规则
      description:
        en_US: JSON array of regex patterns for line sheet discovery, e.g. ["(S18|S006|S20)-.+线"].
        zh_Hans: 自动发现日报工作表的正则数组，例如 ["(S18|S006|S20)-.+线"]。
      type: string
      required: false
      default: ""
    - name: sheets_range
      label:
        en_US: Sheets Range
        zh_Hans: 在线表格读取范围
      type: string
      required: false
      default: "A1:ZZ2000"
    - name: sheet_snapshot_header_rows
      label:
        en_US: Snapshot Header Rows
        zh_Hans: 截图头部行数
      description:
        en_US: Number of leading rows to keep in sheet snapshots.
        zh_Hans: 日报或图片截图时固定保留的前置行数。
      type: string
      required: false
      default: "3"
    - name: sheet_snapshot_tail_nonempty_rows
      label:
        en_US: Snapshot Tail Non-empty Rows
        zh_Hans: 截图尾部有效行数
      description:
        en_US: Number of trailing non-empty rows to keep in sheet snapshots.
        zh_Hans: 日报或图片截图时额外保留的尾部有效行数。
      type: string
      required: false
      default: "20"
    - name: date_mode
      label:
        en_US: Date Mode
        zh_Hans: 日期策略
      description:
        en_US: global means all lines use one date; per-line means each line uses its own date.
        zh_Hans: global 为全线统一日期；per-line 为按线别独立日期。
      type: string
      required: false
      default: "global"
    - name: report_show_placeholder_sections
      label:
        en_US: Show Placeholder Sections
        zh_Hans: 显示占位段
      type: boolean
      required: false
      default: false
    - name: report_output_style
      label:
        en_US: Report Output Style
        zh_Hans: 日报输出模式
      description:
        en_US: concise for management summary, detailed for engineering details, hybrid for summary plus details.
        zh_Hans: concise 为管理摘要，detailed 为工程明细，hybrid 为摘要加明细。
      type: string
      required: false
      default: "concise"
    - name: lookback_days
      label:
        en_US: Lookback Days
        zh_Hans: 回溯天数
      type: string
      required: false
      default: "7"
    - name: trend_days
      label:
        en_US: Trend Days
        zh_Hans: 趋势窗口
      type: string
      required: false
      default: "7"
    - name: report_show_process_trend
      label:
        en_US: Show Process Trend
        zh_Hans: 显示制程趋势
      description:
        en_US: Whether to include process trend section in report text.
        zh_Hans: 是否在日报文本中输出制程趋势段落。
      type: boolean
      required: false
      default: false
    - name: report_show_product_trend
      label:
        en_US: Show Product Trend
        zh_Hans: 显示成品趋势
      description:
        en_US: Whether to include product trend section in report text.
        zh_Hans: 是否在日报文本中输出成品趋势段落。
      type: boolean
      required: false
      default: false
    - name: report_show_spec_attention
      label:
        en_US: Show Governance Attention
        zh_Hans: 显示治理关注
      description:
        en_US: Whether to include governance attention hints in daily report text.
        zh_Hans: 是否在日报文本中输出治理关注提示。
      type: boolean
      required: false
      default: true
    - name: stale_threshold_process
      label:
        en_US: Process Stale Threshold
        zh_Hans: 制程滞后阈值
      type: string
      required: false
      default: "2"
    - name: stale_threshold_product
      label:
        en_US: Product Stale Threshold
        zh_Hans: 成品滞后阈值
      type: string
      required: false
      default: "3"
    - name: stale_threshold_electrochem
      label:
        en_US: Electrochem Stale Threshold
        zh_Hans: 电化学滞后阈值
      type: string
      required: false
      default: "5"
    - name: spec_registry_json
      label:
        en_US: Spec Registry JSON
        zh_Hans: 规格配置 JSON
      description:
        en_US: Optional JSON string, format like {"rules":[{"model":"S18","metric":"成品压实","spec":">=2.37"}]}.
        zh_Hans: 可选 JSON 字符串，示例 {"rules":[{"model":"S18","metric":"成品压实","spec":">=2.37"}]}。
      type: string
      required: false
      default: ""
    - name: spec_limits_json
      label:
        en_US: Extra Spec Limits JSON
        zh_Hans: 额外规格上下限 JSON
      description:
        en_US: Optional extra rules merged with spec_registry_json; same format as spec_registry_json.
        zh_Hans: 可选补充规格规则，会与 spec_registry_json 合并；格式相同。
      type: string
      required: false
      default: ""
    - name: report_metric_aliases_json
      label:
        en_US: Report Metric Aliases JSON
        zh_Hans: 日报指标列别名 JSON
      description:
        en_US: Optional aliases by default/products/lines, e.g. {"products":{"S20":{"烧结压实":["熟化压实"]}}}.
        zh_Hans: 可按 default/products/lines 配置指标列别名，例如 {"products":{"S20":{"烧结压实":["熟化压实"]}}}。
      type: string
      required: false
      default: ""

    - name: bitable_app_token
      label:
        en_US: Bitable App Token
        zh_Hans: 多维表 App Token
      description:
        en_US: Base token/URL. Legacy Wiki token/URL is also accepted and resolved automatically.
        zh_Hans: 支持多维表 token/URL；旧配置保留的 Wiki token/URL 会自动解析为真实多维表 token。
      type: string
      required: false
      default: ""

    - name: keyword_commands
      label:
        en_US: Keyword Commands
        zh_Hans: 日报触发口令
      description:
        en_US: Comma separated report commands, e.g. 日报.
        zh_Hans: 逗号分隔日报口令，例如 日报。
      type: string
      required: false
      default: "日报"
    - name: touch_material_commands
      label:
        en_US: Touch Material Commands
        zh_Hans: 摸料触发口令
      description:
        en_US: Comma separated touch-material commands, e.g. 摸料.
        zh_Hans: 逗号分隔摸料口令，例如 摸料。
      type: string
      required: false
      default: "摸料"
    - name: touch_material_segments
      label:
        en_US: Touch Material Segments
        zh_Hans: 摸料段位列表
      description:
        en_US: Comma separated segment codes accepted by touch-material query.
        zh_Hans: 逗号分隔允许查询的摸料段位，例如 A1,A2,B1,B2,C1,C2。
      type: string
      required: false
      default: "A1,A2,B1,B2,C1,C2"

    - name: sintering_table_ids
      label:
        en_US: Sintering Table IDs
        zh_Hans: 烧结表 ID 列表
      description:
        en_US: Comma separated table IDs. Highest priority.
        zh_Hans: 逗号分隔 table_id，优先级最高。
      type: string
      required: false
      default: ""
    - name: sintering_table_names
      label:
        en_US: Sintering Table Names
        zh_Hans: 烧结表名列表
      description:
        en_US: Comma separated table names to resolve when IDs are not configured.
        zh_Hans: 未配置 table_id 时按表名查找（逗号分隔）。
      type: string
      required: false
      default: "A线烧结汇总,B线烧结汇总,C线烧结汇总"
    - name: kiln_batch_table_ids
      label:
        en_US: Kiln Batch Table IDs
        zh_Hans: 窑炉批次表 ID 列表
      description:
        en_US: Comma separated table IDs for kiln batch in/out records.
        zh_Hans: 窑炉批次进窑出窑表的 table_id 列表（逗号分隔）。
      type: string
      required: false
      default: ""
    - name: kiln_batch_table_names
      label:
        en_US: Kiln Batch Table Names
        zh_Hans: 窑炉批次表名列表
      description:
        en_US: Table names for kiln batch in/out records when IDs are not configured.
        zh_Hans: 未配置 table_id 时，用表名查找窑炉批次进窑出窑表。
      type: string
      required: false
      default: "窑炉批次进窑出窑表,二期窑炉批次进窑出窑表"

    - name: route_field
      label:
        en_US: Route Field
        zh_Hans: 路由字段名
      type: string
      required: false
      default: "路由"
    - name: batch_field
      label:
        en_US: Batch Field
        zh_Hans: 批次字段名
      type: string
      required: false
      default: "批次号"
    - name: message_time_field
      label:
        en_US: Message Time Field
        zh_Hans: 消息时间字段名
      type: string
      required: false
      default: "消息时间"
    - name: detail_max_fields
      label:
        en_US: Detail Max Fields
        zh_Hans: 明细字段上限
      type: string
      required: false
      default: "4"
    - name: scan_limit
      label:
        en_US: Scan Limit
        zh_Hans: 扫描上限
      type: string
      required: false
      default: "1000"

    - name: touch_recipe_field_aliases_json
      label:
        en_US: Touch Recipe Field Aliases JSON
        zh_Hans: 摸料配方字段别名 JSON
      description:
        en_US: JSON map for recipe fields aliases (include iron-phosphorus ratio, lithium, acid, titanium, sugar, peg, kiln temp).
        zh_Hans: 配方六项与窑温列名别名映射 JSON，可覆盖默认映射。
      type: string
      required: false
      default: ""
    - name: touch_material_infer_rules_json
      label:
        en_US: Touch Material Infer Rules JSON
        zh_Hans: 摸料物理性质推断规则 JSON
      description:
        en_US: JSON rule object for low/medium/high compaction bands.
        zh_Hans: 压实均值三档阈值与文案配置 JSON（low/medium/high）。
      type: string
      required: false
      default: ""
    - name: touch_material_no_data_text
      label:
        en_US: Touch Material No Data Text
        zh_Hans: 摸料无数据文案
      description:
        en_US: Reply text when kiln current batch cannot be resolved.
        zh_Hans: 无法判定当前出窑批次时的回复文案。
      type: string
      required: false
      default: "未查到当前出窑批次或烧结压实数据。"

    - name: reply_in_group
      label:
        en_US: Reply In Group
        zh_Hans: 允许群聊回复
      type: boolean
      required: false
      default: true
    - name: reply_in_person
      label:
        en_US: Reply In Person
        zh_Hans: 允许私聊回复
      type: boolean
      required: false
      default: true
    - name: no_data_text
      label:
        en_US: No Data Text
        zh_Hans: 无数据回复文案
      description:
        en_US: Used by bitable brief/fallback path.
        zh_Hans: 多维表日报回退链路无数据时的回复文案。
      type: string
      required: false
      default: "未查到出窑批次或烧结压实数据。"

  components:
    EventListener:
      fromDirs:
        - path: components/event_listeners/
execution:
  python:
    path: main.py
    attr: FeishuKeywordReportPlugin
