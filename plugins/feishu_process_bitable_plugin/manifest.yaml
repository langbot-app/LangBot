apiVersion: v1
kind: Plugin
metadata:
  author: local
  name: feishu_process_bitable_plugin
  repository: 'https://open.feishu.cn/'
  version: 0.3.9
  description:
    en_US: Parse process messages with OCR and write structured records into Feishu Bitable.
    zh_Hans: 解析工艺消息并支持OCR，把结构化结果写入飞书多维表格。
  label:
    en_US: Feishu Process Bitable Plugin
    zh_Hans: 飞书工艺写表插件
  icon: assets/icon.svg
spec:
  config:
    - name: app_id
      label:
        en_US: App ID
        zh_Hans: App ID
      type: string
      required: true
      default: ''
    - name: app_secret
      label:
        en_US: App Secret
        zh_Hans: App Secret
      type: string
      required: true
      default: ''
    - name: token_endpoint
      label:
        en_US: Token Endpoint
        zh_Hans: Token Endpoint
      type: string
      required: false
      default: 'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal'
    - name: timeout_seconds
      label:
        en_US: Timeout Seconds
        zh_Hans: 超时秒数
      type: string
      required: false
      default: '20'
    - name: ocr_endpoint
      label:
        en_US: OCR Endpoint
        zh_Hans: OCR接口
      type: string
      required: false
      default: 'https://open.feishu.cn/open-apis/optical_char_recognition/v1/image/basic_recognize'
    - name: enable_ocr_for_images
      label:
        en_US: Enable OCR For Images
        zh_Hans: 图片启用OCR
      type: boolean
      required: false
      default: true
    - name: bitable_app_token
      label:
        en_US: Bitable App Token
        zh_Hans: 多维表格 App Token
      type: string
      required: true
      default: ''
    - name: bitable_default_table_id
      label:
        en_US: Bitable Default Table ID
        zh_Hans: 默认数据表ID
      type: string
      required: false
      default: ''
    - name: table_routing_json
      label:
        en_US: Table Routing JSON
        zh_Hans: 路由表(JSON)
      description:
        en_US: 'Map route keys to table_id, e.g. {"particle_size.FS":"tblxxx","spray.A":"tblyyy"}. This has highest priority.'
        zh_Hans: '按路由键映射 table_id，例如 {"particle_size.FS":"tblxxx","spray.A":"tblyyy"}。该配置优先级最高。'
      type: json
      required: false
      default: '{}'
    - name: auto_create_table_by_route
      label:
        en_US: Auto Create Table By Route
        zh_Hans: 按路由自动建表
      type: boolean
      required: false
      default: true
    - name: table_name_routing_json
      label:
        en_US: Table Name Routing JSON
        zh_Hans: 路由表名(JSON)
      description:
        en_US: 'Map route keys to table names when table_id is not configured, e.g. {"spray.A":"A线喷雾汇总"}'
        zh_Hans: '未配置 table_id 时，按路由映射到表名并自动创建，例如 {"spray.A":"A线喷雾汇总"}'
      type: json
      required: false
      default: '{}'
    - name: auto_create_fields
      label:
        en_US: Auto Create Missing Fields
        zh_Hans: 自动创建缺失字段
      type: boolean
      required: false
      default: true
    - name: auto_numeric_field
      label:
        en_US: Auto Numeric Field
        zh_Hans: 自动数值字段
      description:
        en_US: Try creating numeric fields (type=2) for int/float values.
        zh_Hans: 对 int/float 字段尝试创建数值列(type=2)。
      type: boolean
      required: false
      default: false
    - name: stringify_text_field_values
      label:
        en_US: Stringify Text Field Values
        zh_Hans: 文本字段转字符串
      description:
        en_US: Convert non-string values to string when writing to text fields.
        zh_Hans: 写入文本字段(type=1)时将非字符串值转为字符串。
      type: boolean
      required: false
      default: true
    - name: bitable_endpoint_template
      label:
        en_US: Bitable Endpoint Template
        zh_Hans: 写入接口模板
      description:
        en_US: Use placeholders {app_token} and {table_id}.
        zh_Hans: 使用占位符 {app_token} 与 {table_id}。
      type: string
      required: false
      default: 'https://open.feishu.cn/open-apis/bitable/v1/apps/{app_token}/tables/{table_id}/records'
    - name: process_switch_json
      label:
        en_US: Process Switch JSON
        zh_Hans: 工艺开关(JSON)
      description:
        en_US: 'Enable/disable built-in parsers, e.g. {"particle_size":true,"spray":true,"feeding":true,"sintering":true,"crushing":true,"pure_water":true}'
        zh_Hans: '内置解析开关，例如 {"particle_size":true,"spray":true,"feeding":true,"sintering":true,"crushing":true,"pure_water":true}'
      type: json
      required: false
      default: '{"particle_size":true,"spray":true,"feeding":true,"sintering":true,"crushing":true,"pure_water":true}'
    - name: merge_particle_size_to_stage_tables
      label:
        en_US: Merge Particle Size To Stage Tables
        zh_Hans: 粒度数据归并到工序汇总表
      description:
        en_US: 'When enabled, FS -> crushing.A/B, CM/XM/HP -> wet_process.A/B, SC -> sintering.A/B, QQT -> spray.A/B.'
        zh_Hans: '开启后，FS 写入 crushing.A/B，CM/XM/HP 写入 wet_process.A/B，SC 写入 sintering.A/B，QQT 写入 spray.A/B。'
      type: boolean
      required: false
      default: true
    - name: rules_json
      label:
        en_US: Extra Rules JSON
        zh_Hans: 额外规则(JSON)
      description:
        en_US: Optional extra extractors with kv_aliases/regex_extractors/constant_fields.
        zh_Hans: 可选追加规则，支持 kv_aliases/regex_extractors/constant_fields。
      type: json
      required: false
      default: '{}'
    - name: write_raw_when_no_match
      label:
        en_US: Write Raw Text If No Match
        zh_Hans: 无匹配时写原文
      type: boolean
      required: false
      default: false
    - name: upsert_by_batch
      label:
        en_US: Upsert By Batch
        zh_Hans: 按批次更新已有行
      description:
        en_US: Update existing row first (match by batch/route/line), create new row only when not found.
        zh_Hans: 优先按批次/路由/产线匹配并更新已有行，未找到时再新增。
      type: boolean
      required: false
      default: true
    - name: upsert_match_include_route
      label:
        en_US: Upsert Match Include Route
        zh_Hans: Upsert匹配包含路由
      type: boolean
      required: false
      default: true
    - name: upsert_match_include_line
      label:
        en_US: Upsert Match Include Line
        zh_Hans: Upsert匹配包含产线
      type: boolean
      required: false
      default: true
    - name: upsert_scan_limit
      label:
        en_US: Upsert Scan Limit
        zh_Hans: Upsert扫描上限
      description:
        en_US: Max records to scan when finding existing row for update.
        zh_Hans: 查找已有行时最多扫描的记录数。
      type: string
      required: false
      default: '1000'
    - name: prevent_default_on_write
      label:
        en_US: Prevent Default On Write
        zh_Hans: 写入成功后阻断默认流程
      type: boolean
      required: false
      default: false
    - name: prevent_default_on_match
      label:
        en_US: Prevent Default On Match
        zh_Hans: 命中规则后阻断默认流程
      description:
        en_US: Prevent default pipeline once this plugin matched and started processing.
        zh_Hans: 只要命中规则并进入插件处理，即阻断默认流程（避免继续走LLM）。
      type: boolean
      required: false
      default: true
    - name: reply_on_write
      label:
        en_US: Reply On Write
        zh_Hans: 写入成功后回复
      type: boolean
      required: false
      default: false
    - name: reply_text_template
      label:
        en_US: Reply Text Template
        zh_Hans: 成功回复文案
      type: string
      required: false
      default: '已写入飞书表格。'
    - name: feedback_detail_limit
      label:
        en_US: Feedback Detail Limit
        zh_Hans: 反馈明细条数上限
      type: string
      required: false
      default: '5'
    - name: reply_in_group
      label:
        en_US: Reply In Group
        zh_Hans: 允许在群聊回复
      type: boolean
      required: false
      default: false
    - name: reply_in_person
      label:
        en_US: Reply In Person
        zh_Hans: 允许在私聊回复
      type: boolean
      required: false
      default: true
    - name: private_notify_on_write
      label:
        en_US: Private Notify On Write
        zh_Hans: 群消息写入成功后私聊通知
      type: boolean
      required: false
      default: true
    - name: private_notify_on_error
      label:
        en_US: Private Notify On Error
        zh_Hans: 群消息处理失败后私聊通知
      type: boolean
      required: false
      default: true
    - name: private_notify_user_id
      label:
        en_US: Private Notify User ID
        zh_Hans: 私聊通知用户ID
      description:
        en_US: Feishu user open_id/union_id for private notification target.
        zh_Hans: 私聊通知目标用户ID（建议填 open_id，例如 ou_xxx）。
      type: string
      required: false
      default: ''
    - name: private_notify_sender_when_group
      label:
        en_US: Private Notify Group Sender
        zh_Hans: 群聊时通知消息发送人
      description:
        en_US: If private_notify_user_id is empty, fallback to the group message sender.
        zh_Hans: 当未设置 private_notify_user_id 时，回退私聊群消息发送人。
      type: boolean
      required: false
      default: false
    - name: reply_on_error
      label:
        en_US: Reply On Error
        zh_Hans: 失败时回复
      type: boolean
      required: false
      default: false
    - name: scenario_field
      label:
        en_US: Scenario Field
        zh_Hans: 工艺字段名
      type: string
      required: false
      default: '业务类型'
    - name: line_field
      label:
        en_US: Line Field
        zh_Hans: 产线字段名
      type: string
      required: false
      default: '产线'
    - name: batch_field
      label:
        en_US: Batch Field
        zh_Hans: 批次字段名
      type: string
      required: false
      default: '批次号'
    - name: route_field
      label:
        en_US: Route Field
        zh_Hans: 路由字段名
      type: string
      required: false
      default: '路由'
    - name: raw_text_field
      label:
        en_US: Raw Text Field
        zh_Hans: 原始文本字段名
      type: string
      required: false
      default: '原始文本'
    - name: ocr_text_field
      label:
        en_US: OCR Text Field
        zh_Hans: OCR文本字段名
      type: string
      required: false
      default: 'OCR文本'
    - name: sender_id_field
      label:
        en_US: Sender ID Field
        zh_Hans: 发送者ID字段名
      type: string
      required: false
      default: '发送者ID'
    - name: launcher_id_field
      label:
        en_US: Launcher ID Field
        zh_Hans: 会话ID字段名
      type: string
      required: false
      default: '会话ID'
    - name: launcher_type_field
      label:
        en_US: Launcher Type Field
        zh_Hans: 会话类型字段名
      type: string
      required: false
      default: '会话类型'
    - name: message_time_field
      label:
        en_US: Message Time Field
        zh_Hans: 消息时间字段名
      type: string
      required: false
      default: '消息时间'
  components:
    EventListener:
      fromDirs:
        - path: components/event_listeners/
execution:
  python:
    path: main.py
    attr: FeishuProcessBitablePlugin

