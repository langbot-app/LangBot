apiVersion: v1
kind: Tool
metadata:
  name: feishu_ocr_image
  label:
    en_US: FeishuOCRImage
    zh_Hans: 飞书图片识别
  description:
    en_US: Recognize text in image with Feishu OCR API.
    zh_Hans: 调用飞书 OCR 接口识别图片中的文字。
spec:
  parameters:
    type: object
    properties:
      image_url:
        type: string
        description: URL of the image to recognize.
      image_base64:
        type: string
        description: Base64 of the image to recognize, supports data URL.
    additionalProperties: false
    anyOf:
      - required:
          - image_url
      - required:
          - image_base64
  llm_prompt: >
    Recognize text from image using Feishu OCR.
    Provide either image_url or image_base64.
execution:
  python:
    path: feishu_ocr_image.py
    attr: FeishuOcrImageTool
