name: Build Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create or update, for example v4.9.6'
        required: true
        type: string
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-web:
    name: Build web and upload to release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
          else
            release_tag="${{ inputs.release_tag }}"
          fi

          if [ -z "$release_tag" ]; then
            echo "release_tag is required."
            exit 1
          fi

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Package web dist
        shell: bash
        run: |
          cd web/dist
          zip -r "../../langbot-web-${{ steps.release.outputs.tag }}.zip" .

      - name: Upload web package to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --notes "Automated release for $RELEASE_TAG"
          fi
          gh release upload "$RELEASE_TAG" "langbot-web-${RELEASE_TAG}.zip" --clobber
