name: Build Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create or update, for example v4.9.6'
        required: true
        type: string
  push:
    branches:
      - master
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-web:
    name: Build web and upload to release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
          elif [[ "$GITHUB_REF" == refs/heads/master ]]; then
            version="$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path('src/langbot/__init__.py').read_text(encoding='utf-8')
          match = re.search(r"__version__\s*=\s*['\"]([^'\"]+)['\"]", text)
          if not match:
              raise SystemExit('Cannot find src/langbot/__init__.py __version__')

          print(match.group(1))
          PY
          )"
            release_tag="v${version#v}"
          else
            release_tag="${{ inputs.release_tag }}"
          fi

          if [ -z "$release_tag" ]; then
            echo "release_tag is required."
            exit 1
          fi

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Package web dist
        shell: bash
        run: |
          cd web/dist
          zip -r "../../langbot-web-${{ steps.release.outputs.tag }}.zip" .

      - name: Upload web package to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --notes "Automated release for $RELEASE_TAG" || true
          fi
          for attempt in 1 2 3 4 5; do
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              break
            fi
            sleep 3
          done
          gh release upload "$RELEASE_TAG" "langbot-web-${RELEASE_TAG}.zip" --clobber
