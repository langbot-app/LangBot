name: Build Plugins

on:
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload built plugin packages to GitHub Releases'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Release tag to upload to when upload_to_release is true'
        required: false
        type: string
  release:
    types: [published]
  pull_request:
    paths:
      - 'plugins/feishu_keyword_report_plugin/**'
      - 'plugins/feishu_process_bitable_plugin/**'
      - '.github/workflows/build-plugins.yml'
  push:
    branches:
      - master
      - develop
    paths:
      - 'plugins/feishu_keyword_report_plugin/**'
      - 'plugins/feishu_process_bitable_plugin/**'
      - '.github/workflows/build-plugins.yml'

permissions:
  contents: write

jobs:
  build-plugin:
    name: Build ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - feishu_keyword_report_plugin
          - feishu_process_bitable_plugin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install plugin builder
        run: |
          python -m pip install --upgrade pip
          python -m pip install "langbot-plugin>=0.2.7"

      - name: Install plugin dependencies
        working-directory: plugins/${{ matrix.plugin }}
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Build plugin package
        working-directory: plugins/${{ matrix.plugin }}
        run: |
          rm -rf dist
          lbp build -o dist
          ls -lah dist

      - name: Upload plugin package to GitHub Release
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release) }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "release_tag is required when upload_to_release is true."
            exit 1
          fi
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Plugin packages for $RELEASE_TAG"
          fi
          gh release upload "$RELEASE_TAG" plugins/${{ matrix.plugin }}/dist/*.lbpkg --clobber
