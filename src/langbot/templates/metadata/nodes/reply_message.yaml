# Reply Message Node Configuration
name: reply_message
category: action
icon: "↩️"
color: '#ef4444'
description: 'workflows.nodes.replyMessageDescription'

inputs:
  - name: message
    type: string
    label:
      en_US: Message
      zh_Hans: 消息
    description:
      en_US: Message to reply
      zh_Hans: 要回复的消息

outputs:
  - name: status
    type: string
    label:
      en_US: Status
      zh_Hans: 状态
    description:
      en_US: Reply status
      zh_Hans: 回复状态
  - name: message_id
    type: string
    label:
      en_US: Message ID
      zh_Hans: 消息 ID
    description:
      en_US: Message ID
      zh_Hans: 消息 ID

config:
  - name: reply_mode
    type: select
    options: ["direct", "quote", "at"]
    default: "direct"
    label:
      en_US: Reply Mode
      zh_Hans: 回复模式
    description:
      en_US: How to reply
      zh_Hans: 回复方式

  - name: message_template
    type: textarea
    label:
      en_US: Message Template
      zh_Hans: 消息模板
    description:
      en_US: Message template with variable interpolation
      zh_Hans: 支持变量插值的消息模板

  - name: long_text_processing
    type: json
    label:
      en_US: Long Text Processing
      zh_Hans: 长文本处理
    description:
      en_US: Long text processing settings
      zh_Hans: 长文本处理设置
    pipeline_config_source: "pipeline:output:long-text-processing"

  - name: force_delay
    type: json
    label:
      en_US: Force Delay
      zh_Hans: 强制延迟
    description:
      en_US: Force delay settings
      zh_Hans: 强制延迟设置
    pipeline_config_source: "pipeline:output:force-delay"
