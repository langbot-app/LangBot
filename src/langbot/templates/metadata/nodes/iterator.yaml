# Iterator Node Configuration
name: iterator
category: control
icon: "🔄"
color: '#f59e0b'
description: 'workflows.nodes.iteratorDescription'

inputs:
  - name: array
    type: array
    label:
      en_US: Array
      zh_Hans: 数组
    description:
      en_US: Array to iterate
      zh_Hans: 要迭代的数组

outputs:
  - name: item
    type: any
    label:
      en_US: Item
      zh_Hans: 项目
    description:
      en_US: Current item
      zh_Hans: 当前项目
  - name: index
    type: integer
    label:
      en_US: Index
      zh_Hans: 索引
    description:
      en_US: Current index
      zh_Hans: 当前索引
  - name: is_first
    type: boolean
    label:
      en_US: Is First
      zh_Hans: 是否第一个
    description:
      en_US: Whether this is the first item
      zh_Hans: 是否是第一个项目
  - name: is_last
    type: boolean
    label:
      en_US: Is Last
      zh_Hans: 是否最后一个
    description:
      en_US: Whether this is the last item
      zh_Hans: 是否是最后一个项目

config:
  - name: parallel
    type: boolean
    default: false
    label:
      en_US: Parallel
      zh_Hans: 并行
    description:
      en_US: Whether to process in parallel
      zh_Hans: 是否并行处理

  - name: max_concurrency
    type: integer
    default: 5
    min_value: 1
    max_value: 100
    label:
      en_US: Max Concurrency
      zh_Hans: 最大并发数
    description:
      en_US: Maximum concurrent tasks
      zh_Hans: 最大并发任务数
    show_if:
      parallel: true
