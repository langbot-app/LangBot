# Store Data Node Configuration
name: store_data
label:
  en_US: Store Data
  zh_Hans: 存储数据
category: action
icon: Database
color: '#ef4444'
description:
  en_US: Store data to persistent storage
  zh_Hans: 将数据存储到持久化存储

inputs:
  - name: key
    type: string
    label:
      en_US: Key
      zh_Hans: 键
    description:
      en_US: Storage key
      zh_Hans: 存储键
  - name: value
    type: any
    label:
      en_US: Value
      zh_Hans: 值
    description:
      en_US: Value to store
      zh_Hans: 要存储的值

outputs:
  - name: status
    type: string
    label:
      en_US: Status
      zh_Hans: 状态
    description:
      en_US: Store status
      zh_Hans: 存储状态

config:
  - name: storage_type
    type: select
    options: ["session", "user", "global", "database"]
    default: "session"
    label:
      en_US: Storage Type
      zh_Hans: 存储类型
    description:
      en_US: Type of storage
      zh_Hans: 存储类型

  - name: ttl
    type: integer
    default: 0
    label:
      en_US: TTL (seconds)
      zh_Hans: 过期时间（秒）
    description:
      en_US: Time to live in seconds
      zh_Hans: 存活时间（秒）

  - name: key_prefix
    type: string
    label:
      en_US: Key Prefix
      zh_Hans: 键前缀
    description:
      en_US: Key prefix
      zh_Hans: 键前缀
