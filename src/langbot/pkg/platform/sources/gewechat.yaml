apiVersion: v1
kind: MessagePlatformAdapter
metadata:
  name: gewechat
  label:
    en_US: GeWeChat
    zh_Hans: GeWeChat（个人微信）
  description:
    en_US: GeWeChat Adapter (Unified Webhook)
    zh_Hans: GeWeChat 适配器（统一 Webhook），请查看文档了解使用方式
  icon: gewechat.png
spec:
  config:
    - name: gewechat_url
      label:
        en_US: GeWeChat URL
        zh_Hans: GeWeChat URL
      description:
        en_US: GeWeChat API server address, e.g. http://127.0.0.1:2531
        zh_Hans: GeWeChat API 服务器地址，如 http://127.0.0.1:2531
      type: string
      required: true
      default: ""
    - name: gewechat_file_url
      label:
        en_US: GeWeChat file download URL
        zh_Hans: GeWeChat 文件下载URL
      description:
        en_US: GeWeChat file download service address
        zh_Hans: GeWeChat 文件下载服务地址
      type: string
      required: true
      default: ""
    - name: callback_base_url
      label:
        en_US: Callback Base URL
        zh_Hans: 回调基础URL
      description:
        en_US: "LangBot public base URL for webhook callbacks, e.g. http://your-server:5300. The full callback URL will be auto-generated as {callback_base_url}/api/bots/{bot_uuid}"
        zh_Hans: "LangBot 对外可访问的基础URL，如 http://your-server:5300。完整回调地址将自动生成为 {callback_base_url}/api/bots/{bot_uuid}"
      type: string
      required: true
      default: ""
    - name: app_id
      label:
        en_US: App ID
        zh_Hans: 应用ID
      type: string
      required: true
      default: ""
    - name: token
      label:
        en_US: Token
        zh_Hans: 令牌
      type: string
      required: true
      default: ""
execution:
  python:
    path: ./gewechat.py
    attr: GeWeChatAdapter
