# Docker Compose configuration for LangBot
# For Kubernetes deployment, see kubernetes.yaml and README_K8S.md
version: "3"

services:

  redis:
    image: redis:7-alpine
    container_name: langbot_redis
    restart: on-failure
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    environment:
      - TZ=Asia/Shanghai
    ports:
      - 6379:6379
    networks:
      - langbot_network


  langbot_plugin_runtime:
    image: rockchin/langbot:latest
    container_name: langbot_plugin_runtime
    volumes:
      - ./data/plugins:/app/data/plugins
    ports:
      - 5401:5401
    restart: on-failure
    environment:
      - TZ=Asia/Shanghai
    command: ["uv", "run", "--no-sync", "-m", "langbot_plugin.cli.__init__", "rt"]
    networks:
      - langbot_network

  langbot:
    image: rockchin/langbot:latest
    container_name: langbot
    volumes:
      - ./data:/app/data
    restart: on-failure
    environment:
      - TZ=Asia/Shanghai
    ports:
      - 5300:5300  # For web ui and webhook callback
      - 2280-2285:2280-2285  # For platform reverse connection
    networks:
      - langbot_network

networks:
  langbot_network:
    driver: bridge
